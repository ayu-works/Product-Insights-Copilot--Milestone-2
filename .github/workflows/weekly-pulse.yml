name: Weekly Pulse

on:
  schedule:
    # 01:30 UTC Monday == 07:00 IST Monday (safe buffer past the Sun 23:30 UTC / Mon 00:00 IST ISO-week boundary)
    - cron: "30 1 * * 1"
  workflow_dispatch:
    inputs:
      week:
        description: "Backfill a specific ISO week (e.g. 2026-W15). Leave empty for the current week."
        required: false
        default: ""

defaults:
  run:
    working-directory: phases/phase-7-orchestration

env:
  # Local sentence-transformers embeddings (BAAI/bge-small-en-v1.5)
  PULSE_EMBEDDING_PROVIDER: local
  PULSE_LOG_LEVEL: INFO

jobs:
  pulse:
    name: pulse run (${{ matrix.product }})
    # Switching back to ubuntu-latest but explicitly disabling IPv6, which
    # is a known cause for 'Connection error' to dual-stack APIs like Groq.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: [groww]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bypass IP Block via Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual
        
      - name: Disable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Initialise database
        run: uv run pulse init-db

      - name: Probe Groq connectivity (diagnostic)
        env:
          PULSE_GROQ_API_KEY: ${{ secrets.PULSE_GROQ_API_KEY }}
        run: |
          echo "==================================================================="
          echo "0. WARP / egress IP identity (Cloudflare trace)"
          echo "==================================================================="
          # If 'warp=on' or 'warp=plus' appears, traffic IS going through WARP.
          curl -s --max-time 15 https://www.cloudflare.com/cdn-cgi/trace/ || echo "  -> trace fetch FAILED"
          echo
          echo "==================================================================="
          echo "1. DNS resolution of api.groq.com"
          echo "==================================================================="
          getent hosts api.groq.com || echo "  -> DNS resolution FAILED"
          echo
          echo "==================================================================="
          echo "2. Raw TCP connect to api.groq.com:443 (transport layer)"
          echo "==================================================================="
          # Times out / refuses if the IP is blocked at the edge before TLS.
          timeout 15 bash -c 'cat < /dev/null > /dev/tcp/api.groq.com/443' \
            && echo "  -> TCP connect OK" \
            || echo "  -> TCP connect FAILED (refused/timed out -> network/IP block)"
          echo
          echo "==================================================================="
          echo "3. Authenticated HTTPS call to the real endpoint"
          echo "==================================================================="
          # -v shows the TLS handshake + HTTP status. We expect 200 (or 401 if key
          # is the issue). A hang/curl-error here = same failure the SDK hits.
          curl -sS -v --max-time 30 https://api.groq.com/openai/v1/models \
            -H "Authorization: Bearer ${PULSE_GROQ_API_KEY}" \
            -o /dev/null -w "  -> HTTP status: %{http_code}  (connect=%{time_connect}s total=%{time_total}s)\n" \
            || echo "  -> curl FAILED -> confirms transport-level failure (not auth/HTTP)"
          echo
          echo "Diagnostic complete. Key is masked by GitHub; safe to read this log."

      - name: Probe Groq via Python SDK (diagnostic)
        env:
          PULSE_GROQ_API_KEY: ${{ secrets.PULSE_GROQ_API_KEY }}
        run: |
          echo "=== proxy / network env seen by Python ==="
          env | grep -iE "proxy|^no_proxy" || echo "  (no proxy vars set)"
          echo
          echo "=== reproduce the exact failing SDK call, full traceback ==="
          uv run python - <<'PY'
          import os, traceback, httpx, groq
          print("httpx:", httpx.__version__, "| groq:", groq.__version__)
          key = os.environ.get("PULSE_GROQ_API_KEY", "")
          print("api key present:", bool(key), "len:", len(key))

          # 1) bare httpx GET (no SDK) — does httpx itself reach Groq?
          try:
              r = httpx.get("https://api.groq.com/openai/v1/models",
                            headers={"Authorization": f"Bearer {key}"}, timeout=30)
              print("bare httpx GET status:", r.status_code)
          except Exception:
              print("bare httpx GET FAILED:")
              traceback.print_exc()

          # 2) the real groq SDK chat call — the exact thing that fails
          try:
              c = groq.Groq(api_key=key)
              resp = c.chat.completions.create(
                  model="llama-3.3-70b-versatile",
                  messages=[{"role": "user", "content": "ping"}],
                  max_tokens=5,
              )
              print("groq SDK chat OK:", resp.choices[0].message.content)
          except Exception:
              print("groq SDK chat FAILED:")
              traceback.print_exc()
          PY
          echo "Python SDK diagnostic complete."

      - name: Run weekly pulse
        env:
          PRODUCT: ${{ matrix.product }}
          PULSE_DOCS_MCP_URL: ${{ secrets.PULSE_DOCS_MCP_URL }}
          PULSE_GMAIL_MCP_URL: ${{ secrets.PULSE_GMAIL_MCP_URL }}
          PULSE_GMAIL_TO: ${{ secrets.PULSE_GMAIL_TO }}
          PULSE_GMAIL_FROM: ${{ secrets.PULSE_GMAIL_FROM }}
          PULSE_GROQ_API_KEY: ${{ secrets.PULSE_GROQ_API_KEY }}
          PULSE_CONFIRM_SEND: "false"
          PULSE_MAX_LLM_COST_USD: "1.0"
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            uv run pulse run --product "$PRODUCT" --week "${{ github.event.inputs.week }}"
          else
            uv run pulse run --product "$PRODUCT" --weeks 10
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.product }}-artifacts
          path: |
            phases/phase-7-orchestration/data/summaries/
            phases/phase-7-orchestration/data/artifacts/
          retention-days: 14
          if-no-files-found: ignore

