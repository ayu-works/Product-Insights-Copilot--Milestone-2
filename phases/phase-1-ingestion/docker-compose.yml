services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PULSE_DB_PATH: /data/pulse.db
      PULSE_LOG_LEVEL: INFO
      PULSE_CONFIRM_SEND: "false"
    volumes:
      - pulse-data:/data
      - ./.env:/app/.env:ro
      - ./products.yaml:/app/products.yaml:ro
    command: ["--help"]
    # Override command for a real run:
    # command: ["run", "--product", "groww", "--weeks", "10"]

volumes:
  pulse-data:
    driver: local
