services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PULSE_DB_PATH: /data/pulse.db
      PULSE_LOG_LEVEL: INFO
      PULSE_CONFIRM_SEND: "false"
      PULSE_DOCS_MCP_COMMAND: "python /app/services/docs-mcp/server.py"
    volumes:
      - pulse-data:/data
      - ./.env:/app/.env:ro
      - ./products.yaml:/app/products.yaml:ro
    command: ["--help"]

  docs-mcp:
    build:
      context: services/docs-mcp
      dockerfile: Dockerfile
    environment:
      GOOGLE_CREDENTIALS_JSON: "${GOOGLE_CREDENTIALS_JSON}"
    # This service is spawned by the agent via stdio when running locally.
    # In Docker, it can be run as a standalone SSE server on port 8001.
    command: ["python", "server.py", "--transport", "sse", "--port", "8001"]
    ports:
      - "8001:8001"

volumes:
  pulse-data:
    driver: local
