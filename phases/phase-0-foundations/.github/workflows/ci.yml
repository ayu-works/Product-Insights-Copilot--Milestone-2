name: CI

on:
  push:
    branches: [main]
    paths:
      - "phases/phase-0-foundations/**"
  pull_request:
    branches: [main]
    paths:
      - "phases/phase-0-foundations/**"

defaults:
  run:
    working-directory: phases/phase-0-foundations

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy agent/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=agent --cov-report=term-missing
